name: Publish Catalog Docs Site

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Weekly Bulk Catalog Release]
    types: [completed]
  push:
    branches: [main]
    paths:
      - docs/catalog/**
      - scripts/build-pages-site.py
      - .github/workflows/pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build static docs site
        run: python scripts/build-pages-site.py --input docs/catalog --output _site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4