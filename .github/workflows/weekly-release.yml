name: Weekly Bulk Catalog Release

on:
  workflow_dispatch:
    inputs:
      with_skus:
        description: Include per-product details for SKU IDs, metadata, and multi-image URLs
        required: false
        default: 'false'
  schedule:
    - cron: '17 10 * * 1'

permissions:
  contents: write

concurrency:
  group: tcgjson-data-cache
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -e .
      - name: Configure git author
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Report TCGplayer product-line support
        run: tcgjson games --output release/games.md --json-output release/games.json
      - name: Download previous release as cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-cache
          gh release download --repo "${{ github.repository }}" --pattern '*.json' --dir release-cache || true
      - name: Build bulk JSON
        shell: bash
        env:
          CACHE_WRITES_ENABLED: ${{ github.ref == 'refs/heads/main' }}
        run: |
          set -euo pipefail

            cache_flush_interval_minutes=$(python -c 'import json; print(int(json.load(open("operations-constraints.json"))["githubActions"]["cacheFlushIntervalMinutes"]))')
            max_intermediate_push_megabytes=$(python -c 'import json; print(int(json.load(open("operations-constraints.json"))["githubActions"]["maxIntermediatePushMegabytes"]))')

          commit_data_cache_if_needed() {
            local reason="$1"
            local force="${2:-false}"
            if [ "$CACHE_WRITES_ENABLED" != "true" ]; then
              return 0
            fi

            local delta_megabytes
            delta_megabytes=$(tcgjson ops cache-delta --data-cache-dir data-cache)
            if [ "$force" != "true" ] && [ "$delta_megabytes" -lt "$max_intermediate_push_megabytes" ]; then
              echo "Data cache delta ${delta_megabytes} MiB is below ${max_intermediate_push_megabytes} MiB; not flushing yet."
              return 0
            fi

            git add data-cache
            if git diff --cached --quiet; then
              echo "No data cache changes to flush."
              return 0
            fi
            git commit -m "Update catalog data cache (${reason}, ${delta_megabytes} MiB)"
            git push
          }

          if [ "${{ github.event.inputs.with_skus }}" = "true" ]; then
            tcgjson build --output release --data-cache-dir data-cache --cache-dir release-cache --refresh-recent-sets 3 --with-details &
          else
            tcgjson build --output release --data-cache-dir data-cache --cache-dir release-cache --refresh-recent-sets 3 &
          fi
          build_pid=$!

          while kill -0 "$build_pid" 2>/dev/null; do
            sleep "${cache_flush_interval_minutes}m"
            commit_data_cache_if_needed "periodic"
          done

          set +e
          wait "$build_pid"
          build_status=$?
          set -e
          commit_data_cache_if_needed "final" true
          exit "$build_status"
      - name: Validate release files
        run: python -m tcgjson.validate release
      - name: Evaluate operational constraints
        run: tcgjson ops evaluate --metrics release/metrics.json --data-cache-dir data-cache
      - name: Commit updated data cache
        if: github.ref == 'refs/heads/main'
        run: |
          git add data-cache
          if ! git diff --cached --quiet; then
            git commit -m "Update catalog data cache"
            git push
          fi
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: weekly-${{ github.run_id }}
          name: Weekly catalog ${{ github.run_id }}
          body: |
            Weekly tcgjson catalog export.

            Start with `bulk-data.json` to discover generated files, sizes, and hashes.
          files: release/*
