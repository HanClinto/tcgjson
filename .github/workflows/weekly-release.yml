name: Weekly Bulk Catalog Release

on:
  workflow_dispatch:
    inputs:
      with_skus:
        description: Include per-product details for SKU IDs, metadata, and multi-image URLs
        required: false
        default: 'false'
  schedule:
    - cron: '17 10 * * 1'

permissions:
  contents: write

concurrency:
  group: tcgjson-weekly-release
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -e .
      - name: Configure git author
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Report TCGplayer product-line support
        run: tcgjson games --output release/games.md --json-output release/games.json
      - name: Download previous release as cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-cache
          gh release download --repo "${{ github.repository }}" --pattern '*.json' --dir release-cache || true

      - name: Build Union Arena
        shell: bash
        env:
          PRODUCT_LINE: '81'
          PRODUCT_LINE_SLUG: union-arena
        run: |
          set -euo pipefail
          mkdir -p release/.metrics
          detail_flag=()
          if [ "${{ github.event.inputs.with_skus }}" = "true" ]; then
            detail_flag=(--with-details)
          fi
          scripts/run-build-with-cache-flush.sh -- tcgjson build --output release --data-cache-dir data-cache --cache-dir release-cache --refresh-recent-sets 3 --product-line "$PRODUCT_LINE" "${detail_flag[@]}"
          cp release/metrics.json "release/.metrics/${PRODUCT_LINE_SLUG}.json"

      - name: Build Riftbound
        shell: bash
        env:
          PRODUCT_LINE: '89'
          PRODUCT_LINE_SLUG: riftbound
        run: |
          set -euo pipefail
          mkdir -p release/.metrics
          detail_flag=()
          if [ "${{ github.event.inputs.with_skus }}" = "true" ]; then
            detail_flag=(--with-details)
          fi
          scripts/run-build-with-cache-flush.sh -- tcgjson build --output release --data-cache-dir data-cache --cache-dir release-cache --refresh-recent-sets 3 --product-line "$PRODUCT_LINE" "${detail_flag[@]}"
          cp release/metrics.json "release/.metrics/${PRODUCT_LINE_SLUG}.json"

      - name: "Build Star Wars: Unlimited"
        shell: bash
        env:
          PRODUCT_LINE: '79'
          PRODUCT_LINE_SLUG: star-wars-unlimited
        run: |
          set -euo pipefail
          mkdir -p release/.metrics
          detail_flag=()
          if [ "${{ github.event.inputs.with_skus }}" = "true" ]; then
            detail_flag=(--with-details)
          fi
          scripts/run-build-with-cache-flush.sh -- tcgjson build --output release --data-cache-dir data-cache --cache-dir release-cache --refresh-recent-sets 3 --product-line "$PRODUCT_LINE" "${detail_flag[@]}"
          cp release/metrics.json "release/.metrics/${PRODUCT_LINE_SLUG}.json"

      - name: Build Disney Lorcana
        shell: bash
        env:
          PRODUCT_LINE: '71'
          PRODUCT_LINE_SLUG: lorcana
        run: |
          set -euo pipefail
          mkdir -p release/.metrics
          detail_flag=()
          if [ "${{ github.event.inputs.with_skus }}" = "true" ]; then
            detail_flag=(--with-details)
          fi
          scripts/run-build-with-cache-flush.sh -- tcgjson build --output release --data-cache-dir data-cache --cache-dir release-cache --refresh-recent-sets 3 --product-line "$PRODUCT_LINE" "${detail_flag[@]}"
          cp release/metrics.json "release/.metrics/${PRODUCT_LINE_SLUG}.json"

      - name: Build One Piece Card Game
        shell: bash
        env:
          PRODUCT_LINE: '68'
