name: Weekly Bulk Catalog Release

on:
  workflow_dispatch:
    inputs:
      with_skus:
        description: Include per-product details for SKU IDs, metadata, and multi-image URLs
        required: false
        default: 'false'
  schedule:
    - cron: '17 10 * * 1'

permissions:
  contents: write

concurrency:
  group: tcgjson-data-cache
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -e .
      - name: Configure git author
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Report TCGplayer product-line support
        run: tcgjson games --output release/games.md --json-output release/games.json
      - name: Download previous release as cache
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-cache
          gh release download --repo "${{ github.repository }}" --pattern '*.json' --dir release-cache || true
          mkdir -p .tcgjson-cache/release-search-cache
          gh release download --repo "${{ github.repository }}" --pattern 'search-cache-v1-*.sqlite.gz' --dir .tcgjson-cache/release-search-cache || true
      - name: Restore search cache from previous release
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p data-cache/search-products
          restored=0
          for cache_asset in .tcgjson-cache/release-search-cache/search-cache-v1-*.sqlite.gz; do
            asset_name="${cache_asset##*/}"
            slug="${asset_name#search-cache-v1-}"
            slug="${slug%.sqlite.gz}"
            gzip -dc "$cache_asset" > "data-cache/search-products/${slug}.sqlite"
            restored=$((restored + 1))
            echo "Restored search cache for ${slug}"
          done
          echo "Restored ${restored} search cache shard(s)."
      - name: "Build Magic: The Gathering"
        shell: bash
        env:
          CACHE_WRITES_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          CACHE_PUSH_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          PRODUCT_LINE: '1'
          PRODUCT_LINE_SLUG: magic-the-gathering
        run: |
          set -euo pipefail
          mkdir -p release/.metrics
          detail_flag=()
          if [ "${{ github.event.inputs.with_skus }}" = "true" ]; then
            detail_flag=(--with-details)
          fi
          scripts/run-build-with-cache-flush.sh -- tcgjson build --output release --data-cache-dir data-cache --cache-dir release-cache --refresh-recent-sets 3 --product-line "$PRODUCT_LINE" "${detail_flag[@]}"
          cp release/metrics.json "release/.metrics/${PRODUCT_LINE_SLUG}.json"

      - name: Build YuGiOh
        shell: bash
        env:
          CACHE_WRITES_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          CACHE_PUSH_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          PRODUCT_LINE: '2'
          PRODUCT_LINE_SLUG: yugioh
        run: |
          set -euo pipefail
          mkdir -p release/.metrics
          detail_flag=()
          if [ "${{ github.event.inputs.with_skus }}" = "true" ]; then
            detail_flag=(--with-details)
          fi
          scripts/run-build-with-cache-flush.sh -- tcgjson build --output release --data-cache-dir data-cache --cache-dir release-cache --refresh-recent-sets 3 --product-line "$PRODUCT_LINE" "${detail_flag[@]}"
          cp release/metrics.json "release/.metrics/${PRODUCT_LINE_SLUG}.json"

      - name: Build Pokemon
        shell: bash
        env:
          CACHE_WRITES_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          CACHE_PUSH_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          PRODUCT_LINE: '3'
          PRODUCT_LINE_SLUG: pokemon
        run: |
          set -euo pipefail
          mkdir -p release/.metrics
          detail_flag=()
          if [ "${{ github.event.inputs.with_skus }}" = "true" ]; then
            detail_flag=(--with-details)
          fi
          scripts/run-build-with-cache-flush.sh -- tcgjson build --output release --data-cache-dir data-cache --cache-dir release-cache --refresh-recent-sets 3 --product-line "$PRODUCT_LINE" "${detail_flag[@]}"
          cp release/metrics.json "release/.metrics/${PRODUCT_LINE_SLUG}.json"

      - name: Build Digimon Card Game
        shell: bash
        env:
          CACHE_WRITES_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          CACHE_PUSH_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          PRODUCT_LINE: '63'
          PRODUCT_LINE_SLUG: digimon-card-game
        run: |
          set -euo pipefail
          mkdir -p release/.metrics
          detail_flag=()
          if [ "${{ github.event.inputs.with_skus }}" = "true" ]; then
            detail_flag=(--with-details)
          fi
          scripts/run-build-with-cache-flush.sh -- tcgjson build --output release --data-cache-dir data-cache --cache-dir release-cache --refresh-recent-sets 3 --product-line "$PRODUCT_LINE" "${detail_flag[@]}"
          cp release/metrics.json "release/.metrics/${PRODUCT_LINE_SLUG}.json"

      - name: Build One Piece Card Game
        shell: bash
        env:
          CACHE_WRITES_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          CACHE_PUSH_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          PRODUCT_LINE: '68'
          PRODUCT_LINE_SLUG: one-piece
        run: |
          set -euo pipefail
          mkdir -p release/.metrics
          detail_flag=()
          if [ "${{ github.event.inputs.with_skus }}" = "true" ]; then
            detail_flag=(--with-details)
          fi
          scripts/run-build-with-cache-flush.sh -- tcgjson build --output release --data-cache-dir data-cache --cache-dir release-cache --refresh-recent-sets 3 --product-line "$PRODUCT_LINE" "${detail_flag[@]}"
          cp release/metrics.json "release/.metrics/${PRODUCT_LINE_SLUG}.json"

      - name: Build Disney Lorcana
        shell: bash
        env:
          CACHE_WRITES_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          CACHE_PUSH_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          PRODUCT_LINE: '71'
          PRODUCT_LINE_SLUG: lorcana
        run: |
          set -euo pipefail
          mkdir -p release/.metrics
          detail_flag=()
          if [ "${{ github.event.inputs.with_skus }}" = "true" ]; then
            detail_flag=(--with-details)
          fi
          scripts/run-build-with-cache-flush.sh -- tcgjson build --output release --data-cache-dir data-cache --cache-dir release-cache --refresh-recent-sets 3 --product-line "$PRODUCT_LINE" "${detail_flag[@]}"
          cp release/metrics.json "release/.metrics/${PRODUCT_LINE_SLUG}.json"

      - name: "Build Star Wars: Unlimited"
        shell: bash
        env:
          CACHE_WRITES_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          CACHE_PUSH_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          PRODUCT_LINE: '79'
          PRODUCT_LINE_SLUG: star-wars-unlimited
        run: |
          set -euo pipefail
          mkdir -p release/.metrics
          detail_flag=()
          if [ "${{ github.event.inputs.with_skus }}" = "true" ]; then
            detail_flag=(--with-details)
          fi
          scripts/run-build-with-cache-flush.sh -- tcgjson build --output release --data-cache-dir data-cache --cache-dir release-cache --refresh-recent-sets 3 --product-line "$PRODUCT_LINE" "${detail_flag[@]}"
          cp release/metrics.json "release/.metrics/${PRODUCT_LINE_SLUG}.json"

      - name: Build Riftbound
        shell: bash
        env:
          CACHE_WRITES_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          CACHE_PUSH_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          PRODUCT_LINE: '89'
          PRODUCT_LINE_SLUG: riftbound
        run: |
          set -euo pipefail
          mkdir -p release/.metrics
          detail_flag=()
          if [ "${{ github.event.inputs.with_skus }}" = "true" ]; then
            detail_flag=(--with-details)
          fi
          scripts/run-build-with-cache-flush.sh -- tcgjson build --output release --data-cache-dir data-cache --cache-dir release-cache --refresh-recent-sets 3 --product-line "$PRODUCT_LINE" "${detail_flag[@]}"
          cp release/metrics.json "release/.metrics/${PRODUCT_LINE_SLUG}.json"

      - name: Build Union Arena
        shell: bash
        env:
          CACHE_WRITES_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          CACHE_PUSH_ENABLED: ${{ github.ref == 'refs/heads/main' }}
          PRODUCT_LINE: '81'
          PRODUCT_LINE_SLUG: union-arena
        run: |
          set -euo pipefail
          mkdir -p release/.metrics
          detail_flag=()
          if [ "${{ github.event.inputs.with_skus }}" = "true" ]; then
            detail_flag=(--with-details)
          fi
          scripts/run-build-with-cache-flush.sh -- tcgjson build --output release --data-cache-dir data-cache --cache-dir release-cache --refresh-recent-sets 3 --product-line "$PRODUCT_LINE" "${detail_flag[@]}"
          cp release/metrics.json "release/.metrics/${PRODUCT_LINE_SLUG}.json"

      - name: Assemble bulk release
        run: tcgjson assemble-release --output release
      - name: Validate release files
        run: python -m tcgjson.validate release
      - name: Evaluate operational constraints
        run: tcgjson ops evaluate --metrics release/metrics.json --data-cache-dir data-cache
      - name: Commit updated data cache
        if: github.ref == 'refs/heads/main'
        run: |
          git add data-cache/README.md data-cache/product-details
          if ! git diff --cached --quiet; then
            git commit -m "Update catalog data cache"
            git push
          fi
      - name: Package search cache assets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          packaged=0
          for search_cache in data-cache/search-products/*.sqlite; do
            slug="${search_cache##*/}"
            slug="${slug%.sqlite}"
            gzip -c -9 "$search_cache" > "release/search-cache-v1-${slug}.sqlite.gz"
            packaged=$((packaged + 1))
            echo "Packaged search cache for ${slug}"
          done
          echo "Packaged ${packaged} search cache shard(s)."
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: weekly-${{ github.run_id }}
          name: Weekly catalog ${{ github.run_id }}
          body: |
            Weekly tcgjson catalog export.

            Start with `bulk-data.json` to discover generated files, sizes, and hashes.
          files: release/*
